<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在跳转 CAX 登录…</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        color: #606266;
        background: #f5f7fa;
      }
    </style>
  </head>
  <body>
    <p id="msg">正在跳转 CAX 论坛登录…</p>
    <script>
      ;(async function () {
        var STEP_KEY = 'mechbox_auth_login_ready'
        var params = new URLSearchParams(location.search)
        var ret = params.get('return') || '/account'
        if (!ret.startsWith('/') || ret.startsWith('//')) ret = '/account'
        var target = '/api/auth/login?return=' + encodeURIComponent(ret)

        if ('serviceWorker' in navigator) {
          try {
            var regs = await navigator.serviceWorker.getRegistrations()
            await Promise.all(regs.map(function (r) { return r.unregister() }))
          } catch (e) {
            /* continue */
          }
        }

        // 旧 SW 控制当前页时，注销后须重载一次才能真正走网络
        if (sessionStorage.getItem(STEP_KEY) !== '1') {
          sessionStorage.setItem(STEP_KEY, '1')
          location.reload()
          return
        }
        sessionStorage.removeItem(STEP_KEY)
        location.replace(target)
      })()
    </script>
  </body>
</html>
